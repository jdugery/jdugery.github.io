<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Red Hot Philly Peppers</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1114;
      --bg-warm: #15181d;
      --panel: #171a20;
      --panel-2: #1c2027;
      --text: #f5f5f5;
      --muted: #b7bcc6;
      --border: #2a2f38;
      --accent: #b22a21;
      --accent-dark: #8d211a;
      --accent-soft: #e45a4c;
      --deep: #ffffff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius-lg: 30px;
      --radius-md: 20px;
      --max: 1180px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(178, 42, 33, 0.22), transparent 35%),
        radial-gradient(circle at 85% 30%, rgba(178, 42, 33, 0.14), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(178, 42, 33, 0.12), transparent 50%),
        linear-gradient(to bottom, #0b0c10 0%, #0f1114 100%);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(18, 18, 22, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: white;
      position: relative;
      padding-left: 16px;
    }

    .brand::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 6px;
      border-radius: 999px;
      background: linear-gradient(to bottom, var(--accent-soft), var(--accent-dark));
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #c9cdd4;
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent-soft);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .hero {
      max-width: var(--max);
      margin: 0 auto;
      padding: 34px 20px 24px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      align-items: stretch;
    }

    .hero-main {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(228, 90, 76, 0.08), rgba(255, 255, 255, 0) 45%), var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 66px 56px;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-main::before {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(178, 42, 33, 0.2), transparent 70%);
      pointer-events: none;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      left: 56px;
      bottom: 42px;
      width: 110px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(to right, var(--accent), transparent);
      pointer-events: none;
    }

    .eyebrow {
      margin-bottom: 14px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--accent-soft);
    }

    .hero h1 {
      margin: 0 0 16px;
      max-width: 720px;
      font-size: clamp(52px, 7vw, 88px);
      line-height: 0.94;
      letter-spacing: -2px;
      color: white;
    }

    .hero p {
      margin: 0 0 32px;
      max-width: 640px;
      font-size: clamp(18px, 2.1vw, 24px);
      color: var(--muted);
    }

    .hero-side {
      display: grid;
    }

    .hero-image-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      min-height: 400px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: #12151b;
    }

    .hero-image-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.18), transparent 35%);
      pointer-events: none;
    }

    .hero-image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .section {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 20px 32px;
    }

    .section-box {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 42px 34px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-box::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--accent), var(--accent-soft), transparent 78%);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .section-title-wrap h2 {
      margin: 0 0 8px;
      font-size: 38px;
      line-height: 1.02;
      letter-spacing: -1px;
      color: white;
    }

    .section-title-wrap p {
      margin: 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 17px;
    }

    .gallery-frame {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(to bottom, #1a1e25, #161a20);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    .main-image-link {
      display: block;
      text-decoration: none;
      cursor: pointer;
    }

    .gallery-frame img {
      width: 100%;
      height: 68vh;
      object-fit: contain;
      background: #12151b;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(15, 17, 20, 0.75);
      color: white;
      font-size: 22px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      z-index: 2;
    }

    .gallery-btn:hover {
      background: rgba(178, 42, 33, 0.88);
      border-color: rgba(228, 90, 76, 0.5);
    }

    .gallery-btn.left {
      left: 18px;
    }

    .gallery-btn.right {
      right: 18px;
    }

    .caption {
      padding: 18px 22px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 16px;
      background: var(--panel-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .caption-text {
      flex: 1;
      min-width: 220px;
    }

    .open-link {
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: var(--accent-soft);
    }

    .open-link:hover {
      color: white;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }

    .thumb-btn {
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .thumbs img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: linear-gradient(to bottom, #1a1e25, #161a20);
      opacity: 0.72;
      transition: transform 0.2s ease, opacity 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      display: block;
    }

    .thumbs img:hover {
      opacity: 1;
      transform: translateY(-4px);
      border-color: rgba(228, 90, 76, 0.45);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    .thumbs img.active {
      opacity: 1;
      border-color: rgba(228, 90, 76, 0.55);
      box-shadow: 0 0 0 1px rgba(228, 90, 76, 0.18), 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 20px 34px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.4px;
      color: var(--muted);
    }

    @media (max-width: 1050px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-main {
        min-height: auto;
      }

      .hero-image-card {
        min-height: 320px;
      }
    }

    @media (max-width: 850px) {
      .gallery-frame img {
        height: 54vh;
      }
    }

    @media (max-width: 680px) {
      .nav-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        gap: 12px;
      }

      .hero {
        padding-top: 20px;
      }

      .hero-main {
        padding: 42px 28px;
      }

      .section-box {
        padding: 32px 22px;
      }

      .section-head {
        align-items: flex-start;
      }

      .hero h1,
      .section-title-wrap h2 {
        font-size: 30px;
        letter-spacing: -0.8px;
      }

      .gallery-btn {
        width: 46px;
        height: 46px;
        font-size: 18px;
      }

      .gallery-btn.left {
        left: 12px;
      }

      .gallery-btn.right {
        right: 12px;
      }

      .thumbs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .thumbs img {
        height: 92px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="brand">Red Hot Philly Peppers</div>

      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="varieties.html">Varieties</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-grid">
      <div class="hero-main">
        <div class="eyebrow">Specialty Pepper Farm</div>
        <h1>Gallery</h1>
        <p>Flicks from da Farm</p>
      </div>

      <div class="hero-side">
        <div class="hero-image-card">
          <img src="armageddon_pair.jpeg" alt="Armageddon Pair" />
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-box">
      <div class="section-head">
        <div class="section-title-wrap">
          <h2>Gallery</h2>
          <p></p>
        </div>
      </div>

      <div class="gallery-frame">
        <button class="gallery-btn left" type="button" onclick="prevImage()" aria-label="Previous image">&#10094;</button>

        <a id="mainImageLink" class="main-image-link" href="images/annuum_flower.jpeg" target="_blank">
          <img id="mainImage" src="images/annuum_flower.jpeg" alt="Gallery image" />
        </a>

        <button class="gallery-btn right" type="button" onclick="nextImage()" aria-label="Next image">&#10095;</button>

        <div class="caption">
          <div class="caption-text" id="caption">Annuum Flower</div>
          <a id="openImageLink" class="open-link" href="images/annuum_flower.jpeg" target="_blank">Open full image</a>
        </div>
      </div>

      <div class="thumbs" id="thumbnails"></div>
    </div>
  </section>

  <footer>
    © 2026 Red Hot Philly Peppers
  </footer>

  <script>
    const images = [
      {
        src: "images/annuum_flower.jpeg",
        caption: "Annuum Flower"
      },
      {
        src: "images/armageddon_1.jpeg",
        caption: "Armageddon"
      },
      {
        src: "images/armageddons.jpeg",
        caption: "A handful of armageddons (and a jalapeño)"
      },
      {
        src: "images/ghost_on_plant.jpeg",
        caption: "Ghosts ripening"
      },
      {
        src: "images/hot_harvest.jpeg",
        caption: "A harvest of hot peppers from the RHPP farm"
      },
      {
        src: "images/mixed_hots.jpeg",
        caption: "A variety of mixed hots & superhots"
      },
      {
        src: "images/poblano_ripening.jpeg",
        caption: "A RHPP poblano ripening to a deep red"
      },
      {
        src: "images/ripening_armageddons.jpeg",
        caption: "Armageddons ripening on the plant"
      },
      {
        src: "images/ripening_ghost_2.jpeg",
        caption: "Ghost pepper ripening"
      },
      {
        src: "images/ripening_ghost_3.jpeg",
        caption: "Another ripening ghost pepper"
      },
      {
        src: "images/tabasco_canopy.jpeg",
        caption: "A bushy overhead view of a RHPP tabasco plant"
      },
      {
        src: "images/unripe_armageddon.jpeg",
        caption: "A green armageddon, soon to be fiery red"
      },
      {
        src: "gallery5.jpg",
        caption: "Pepper photo 13"
      },
      {
        src: "gallery5.jpg",
        caption: "Pepper photo 14"
      },
      {
        src: "gallery5.jpg",
        caption: "Pepper photo 15"
      }
    ];

    let currentIndex = 0;

    const mainImage = document.getElementById("mainImage");
    const mainImageLink = document.getElementById("mainImageLink");
    const openImageLink = document.getElementById("openImageLink");
    const caption = document.getElementById("caption");
    const thumbnails = document.getElementById("thumbnails");

    function renderImage() {
      const currentImage = images[currentIndex];

      mainImage.src = currentImage.src;
      mainImage.alt = currentImage.caption;
      mainImageLink.href = currentImage.src;
      openImageLink.href = currentImage.src;
      caption.textContent = currentImage.caption;

      const thumbImages = thumbnails.querySelectorAll("img");
      thumbImages.forEach((img, index) => {
        img.classList.toggle("active", index === currentIndex);
      });
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      renderImage();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      renderImage();
    }

    function buildThumbnails() {
      thumbnails.innerHTML = "";

      images.forEach((image, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "thumb-btn";
        button.setAttribute("aria-label", `Show ${image.caption}`);

        const thumb = document.createElement("img");
        thumb.src = image.src;
        thumb.alt = image.caption;

        button.addEventListener("click", () => {
          currentIndex = index;
          renderImage();
        });

        button.appendChild(thumb);
        thumbnails.appendChild(button);
      });
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        event.preventDefault();
        nextImage();
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        prevImage();
      }
    });

    buildThumbnails();
    renderImage();
  </script>
</body>
</html>
