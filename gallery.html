<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Red Hot Philly Peppers</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #090909;
      --bg-2: #111111;
      --panel: rgba(255, 255, 255, 0.06);
      --panel-strong: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --soft: rgba(255, 255, 255, 0.56);
      --accent: #c62828;
      --accent-soft: rgba(198, 40, 40, 0.18);
      --accent-line: rgba(198, 40, 40, 0.34);
      --shadow: 0 22px 55px rgba(0, 0, 0, 0.34);
      --blur: blur(14px);
      --max: 1180px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(circle at top, rgba(198, 40, 40, 0.18), transparent 32%),
        linear-gradient(180deg, #080808 0%, #0d0d0d 55%, #070707 100%);
      min-height: 100vh;
    }

    nav {
      background: rgba(10, 10, 10, 0.7);
      padding: 20px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      margin: 0 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: color 0.2s ease, opacity 0.2s ease;
    }

    nav a:hover {
      color: #ff6b6b;
    }

    .page-header {
      max-width: var(--max);
      margin: 0 auto;
      text-align: center;
      padding: 86px 20px 26px;
    }

    .page-header h1 {
      margin: 0 0 10px;
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -1px;
    }

    .page-header p {
      margin: 0 auto;
      max-width: 700px;
      color: var(--muted);
      font-size: 18px;
    }

    .gallery-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 20px 20px 90px;
    }

    .gallery {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
    }

    .gallery::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(255,255,255,0.04), transparent 22%, transparent 78%, rgba(0,0,0,0.16));
      z-index: 1;
    }

    .gallery img {
      display: block;
      width: 100%;
      height: 68vh;
      object-fit: cover;
      background: #0d0d0d;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(10, 10, 10, 0.54);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      cursor: pointer;
      font-size: 24px;
      transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      z-index: 2;
    }

    .gallery-btn:hover {
      background: rgba(198, 40, 40, 0.3);
      border-color: rgba(255, 255, 255, 0.24);
    }

    .gallery-btn.left {
      left: 20px;
    }

    .gallery-btn.right {
      right: 20px;
    }

    .caption {
      position: relative;
      z-index: 2;
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 16px;
      background: rgba(10, 10, 10, 0.52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .thumbs img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
      border-radius: 16px;
      border: 1px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      transition: opacity 0.2s ease, transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .thumbs img:hover {
      opacity: 1;
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .thumbs img.active {
      opacity: 1;
      border-color: var(--accent-line);
      box-shadow: 0 0 0 1px var(--accent-soft), 0 14px 28px rgba(0,0,0,0.26);
    }

    footer {
      text-align: center;
      padding: 34px 20px;
      color: var(--soft);
      background: rgba(8, 8, 8, 0.85);
      font-size: 14px;
      border-top: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @media (max-width: 850px) {
      .gallery img {
        height: 52vh;
      }
    }

    @media (max-width: 600px) {
      nav {
        padding: 18px 14px;
      }

      nav a {
        margin: 0 10px;
        font-size: 13px;
      }

      .page-header {
        padding: 72px 18px 22px;
      }

      .page-header p {
        font-size: 16px;
      }

      .gallery {
        border-radius: 22px;
      }

      .gallery-btn {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }

      .gallery-btn.left {
        left: 12px;
      }

      .gallery-btn.right {
        right: 12px;
      }

      .caption {
        padding: 16px 18px;
      }

      .thumbs {
        grid-template-columns: repeat(2, 1fr);
      }

      .thumbs img {
        height: 92px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="varieties.html">Varieties</a>
    <a href="gallery.html">Gallery</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <section class="page-header">
    <h1>Gallery</h1>
    <p>Flicks from da Farm</p>
  </section>

  <section class="gallery-wrap">
    <div class="gallery">
      <button class="gallery-btn left" onclick="prevImage()">&#10094;</button>
      <img id="mainImage" src="gallery1.jpg" alt="Gallery image" />
      <button class="gallery-btn right" onclick="nextImage()">&#10095;</button>
      <div class="caption" id="caption">Pepper photo 1</div>
    </div>

    <div class="thumbs" id="thumbnails"></div>
  </section>

  <footer>
    © 2026 Red Hot Philly Peppers
  </footer>

  <script>
    const images = [
      {
        src: "gallery1.jpg",
        caption: "Pepper photo 1"
      },
      {
        src: "gallery2.jpg",
        caption: "Pepper photo 2"
      },
      {
        src: "gallery3.jpg",
        caption: "Pepper photo 3"
      },
      {
        src: "gallery4.jpg",
        caption: "Pepper photo 4"
      },
      {
        src: "gallery5.jpg",
        caption: "Pepper photo 5"
      }
    ];

    let currentIndex = 0;

    const mainImage = document.getElementById("mainImage");
    const caption = document.getElementById("caption");
    const thumbnails = document.getElementById("thumbnails");

    function renderImage() {
      mainImage.src = images[currentIndex].src;
      caption.textContent = images[currentIndex].caption;

      const thumbImages = thumbnails.querySelectorAll("img");
      thumbImages.forEach((img, index) => {
        img.classList.toggle("active", index === currentIndex);
      });
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % images.length;
      renderImage();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      renderImage();
    }

    function buildThumbnails() {
      images.forEach((image, index) => {
        const thumb = document.createElement("img");
        thumb.src = image.src;
        thumb.alt = image.caption;
        thumb.addEventListener("click", () => {
          currentIndex = index;
          renderImage();
        });
        thumbnails.appendChild(thumb);
      });
    }

    buildThumbnails();
    renderImage();
  </script>

</body>
</html>
