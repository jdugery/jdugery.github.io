<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Red Hot Philly Peppers</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0b0b0b;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.12);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);
      --soft: rgba(255, 255, 255, 0.62);
      --accent: #d62828;
      --accent-hover: #ef4444;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --blur: blur(14px);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.7)),
        url("images/your-pepper-photo.jpg") center/cover fixed;
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      text-align: center;
      padding: 20px 24px;
      background: rgba(10, 10, 10, 0.58);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      margin: 0 18px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: color 0.2s ease;
    }

    nav a:hover,
    nav a.active {
      color: var(--accent-hover);
    }

    .hero-small {
      padding: 90px 20px 40px;
      text-align: center;
    }

    .hero-small h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 1px;
    }

    .hero-small p {
      max-width: 760px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .content {
      max-width: 980px;
      margin: 0 auto 80px;
      padding: 0 20px;
      display: grid;
      gap: 24px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.4rem;
      color: var(--text);
    }

    .card p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    ul {
      margin: 12px 0 0;
      padding-left: 20px;
      color: var(--muted);
    }

    li {
      margin-bottom: 10px;
    }

    .cta {
      text-align: center;
      padding-top: 8px;
    }

    .button {
      display: inline-block;
      margin-top: 10px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      padding: 24px 20px 40px;
      color: var(--soft);
      font-size: 0.95rem;
    }

    @media (max-width: 760px) {
      nav a {
        margin: 0 10px;
        font-size: 14px;
      }

      .card {
        padding: 22px;
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="varieties.html">Varieties</a>
    <a href="gallery.html">Gallery</a>
    <a href="about.html" class="active">About</a>
  </nav>

  <section class="hero-small">
    <h1>About Red Hot Philly Peppers</h1>
    <p>
Red Hot Philly Peppers is a local farm specializing in peppers, ranging from mild to scorching and from as common as a jalapeño to as niche as a purple gator jigsaw.    </p>
  </section>


  <footer>
    © 2026 Red Hot Philly Peppers
  </footer>

</body>
</html>
