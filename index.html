<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Hot Philly Peppers</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1114;
      --bg-warm: #15181d;
      --panel: #171a20;
      --panel-2: #1c2027;
      --text: #f5f5f5;
      --muted: #b7bcc6;
      --border: #2a2f38;
      --accent: #b22a21;
      --accent-dark: #8d211a;
      --accent-soft: #e45a4c;
      --deep: #ffffff;
      --shadow: 0 18px 50px rgba(0,0,0,0.35);
      --radius-lg: 30px;
      --radius-md: 20px;
      --max: 1180px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(178,42,33,0.25), transparent 35%),
        radial-gradient(circle at 85% 30%, rgba(178,42,33,0.18), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(178,42,33,0.15), transparent 50%),
        linear-gradient(to bottom, #0b0c10 0%, #0f1114 100%);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(18,18,22,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: white;
      position: relative;
      padding-left: 16px;
    }

    .brand::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 6px;
      border-radius: 999px;
      background: linear-gradient(to bottom, var(--accent-soft), var(--accent-dark));
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #c9cdd4;
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent-soft);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .hero {
      max-width: var(--max);
      margin: 0 auto;
      padding: 34px 20px 24px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      align-items: stretch;
    }

    .hero-main {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 66px 56px;
      min-height: 580px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      margin-bottom: 18px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--accent-soft);
    }

    .hero h1 {
      margin: 0 0 18px;
      max-width: 720px;
      font-size: clamp(48px, 7vw, 88px);
      line-height: 0.94;
      letter-spacing: -2px;
      color: white;
    }

    .hero p {
      margin: 0 0 32px;
      max-width: 640px;
      font-size: clamp(18px, 2.1vw, 24px);
      color: var(--muted);
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.4px;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(to bottom, #c13228, var(--accent));
      color: white;
      box-shadow: 0 10px 24px rgba(163, 38, 29, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(to bottom, #d63b2f, var(--accent-dark));
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: white;
      border-color: rgba(255,255,255,0.12);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .hero-image-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      min-height: 400px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .hero-image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 20px 34px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
  </style>
</head>

<body>

<nav>
  <div class="nav-inner">
    <div class="brand">Red Hot Philly Peppers</div>

    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="varieties.html">Varieties</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-grid">
    <div class="hero-main">

      <div class="eyebrow">Specialty pepper farm</div>

      <p>Specialty peppers, seeds, spices, and more.</p>

      <div class="hero-buttons">
        <a href="varieties.html" class="btn btn-primary">View Varieties</a>
        <a href="contact.html" class="btn btn-secondary">Contact</a>
      </div>

    </div>

    <div class="hero-side">
      <div class="hero-image-card">
        <img src="pepper_bowl_1.png" alt="Red Hot Philly Peppers harvest" />
      </div>
    </div>
  </div>
</section>

<footer>
© 2026 Red Hot Philly Peppers
</footer>

</body>
</html>
