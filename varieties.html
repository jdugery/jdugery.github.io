    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1114;
      --bg-warm: #15181d;
      --panel: #171a20;
      --panel-2: #1c2027;
      --text: #f5f5f5;
      --muted: #b7bcc6;
      --border: #2a2f38;
      --accent: #b22a21;
      --accent-dark: #8d211a;
      --accent-soft: #e45a4c;
      --deep: #ffffff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      --radius-lg: 30px;
      --radius-md: 20px;
      --max: 1180px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(178, 42, 33, 0.22), transparent 35%),
        radial-gradient(circle at 85% 30%, rgba(178, 42, 33, 0.14), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(178, 42, 33, 0.12), transparent 50%),

      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
    }

    button {
      font: inherit;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(18, 18, 22, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: white;
      position: relative;
      padding-left: 16px;
    }

    .brand::before {
      content: "";
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 6px;
      border-radius: 999px;
      background: linear-gradient(to bottom, var(--accent-soft), var(--accent-dark));
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      color: #c9cdd4;
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--accent-soft);
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      transform: scaleX(1);
    }

    .hero-small-wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 30px 20px 18px;
    }

    .hero-small {
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 64px 36px 52px;
      background: linear-gradient(135deg, rgba(228, 90, 76, 0.08), rgba(255, 255, 255, 0) 48%), var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .hero-small::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--accent), var(--accent-soft), transparent 78%);
    }

    .hero-small::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -70px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(178, 42, 33, 0.2), transparent 70%);
      pointer-events: none;
    }

    .hero-small h1 {
      position: relative;
      margin: 0 0 14px;
      font-size: clamp(42px, 6vw, 64px);
      line-height: 0.98;
      letter-spacing: -1.5px;
      color: white;
    }

    .hero-small p {
      position: relative;
      margin: 0 auto;
      max-width: 760px;
      color: var(--muted);
      font-size: 19px;
    }

    .section {
      max-width: var(--max);
      margin: 0 auto;
      padding: 18px 20px 80px;
    }

    .section-box {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 34px 30px 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-box::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, var(--accent), var(--accent-soft), transparent 78%);
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 26px;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.04);
      color: #d7dbe2;
      border: 1px solid var(--border);
      padding: 11px 18px;
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .filter-btn:hover {
      border-color: rgba(228, 90, 76, 0.45);
      color: var(--accent-soft);
      transform: translateY(-1px);
    }

    .filter-btn.active {
      background: linear-gradient(to bottom, #c13228, var(--accent));
      border-color: var(--accent);
      color: white;
      box-shadow: 0 10px 24px rgba(163, 38, 29, 0.25);
    }

    .results-label {
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 30px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 18px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
    }

    .pepper-card {
      height: 100%;
    }

    .card {
      position: relative;
      background: linear-gradient(to bottom, #1a1e25, #161a20);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px 22px 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      height: 100%;
      min-height: 230px;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 0;
      width: 42px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent);
    }

    .card-link:hover .card {
      transform: translateY(-4px);
      border-color: rgba(228, 90, 76, 0.45);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
    }

    .card h3 {
      margin: 0 0 8px;
      color: #fff;
      font-size: 26px;
      line-height: 1.08;
    }

    .species-tag {
      display: inline-block;
      margin-top: 4px;
      margin-bottom: 12px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.8px;
      border-radius: 999px;
      background: rgba(228, 90, 76, 0.1);
      color: var(--accent-soft);
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }

    .spice-meter {
      margin: 2px 0 12px;
      font-size: 18px;
      color: #ff3b30;
      letter-spacing: 2px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 20px 34px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 13px;

    @media (max-width: 850px) {
      .hero-small {

      }

    @media (max-width: 680px) {
      .nav-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        gap: 12px;
      }

      .section-box {

      }

      .card-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function spiceIcons(level) {

    function renderCards(filter = "all") {

        return filter === "all" || pepper.species === filter;

        <div class="pepper-card" data-species="${pepper.species}">
          <a href="${pepper.file}" class="card-link">
            <div class="card">
              <h3>${pepper.name}</h3>
              <div class="species-tag">${pepper.speciesLabel}</div>
              <div class="spice-meter">${spiceIcons(pepper.spice)}</div>
              <p>${pepper.description}</p>
            </div>
          </a>
        </div>
      `).join("");

      if (filter === "all") {
        resultsLabel.textContent = "Showing all varieties";
      } else {
        resultsLabel.textContent = `Showing ${filter} varieties`;
      }
    }

    renderCards();

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        buttons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        renderCards(button.dataset.filter);
      });
    });
  </script>

</body>
</html>
