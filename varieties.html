  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      line-height: 1.5;
    }

    nav {
      background: #0a0a0a;
      padding: 18px 24px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 18px;
      font-size: 17px;
      font-weight: 600;
    }

    nav a:hover {
      color: #ff4d4d;
    }

    .hero-small {
      text-align: center;
      padding: 70px 20px 40px;
      background: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.7));
      border-bottom: 1px solid #222;
    }

    .hero-small h1 {
      margin: 0 0 12px;
      font-size: 52px;
      letter-spacing: 1px;
    }

    .hero-small p {
      margin: 0 auto;
      max-width: 760px;
      color: #d0d0d0;
      font-size: 19px;
    }

    .section {
      max-width: 1150px;
      margin: 0 auto;
      padding: 45px 20px 80px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .filter-btn {
      background: #1b1b1b;
      color: white;
      border: 1px solid #2a2a2a;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .filter-btn:hover {
      border-color: #444;
      color: #ff8a8a;
    }

    .filter-btn.active {
      background: #c1121f;
      border-color: #c1121f;
      color: white;
    }

    .results-label {
      text-align: center;
      color: #bbb;
      font-size: 16px;
      margin-bottom: 28px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: #1b1b1b;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      transition: transform 0.15s ease, border-color 0.15s ease;
      height: 100%;
    }

    .card-link:hover .card {
      transform: translateY(-3px);
      border-color: #3a3a3a;
    }

    .card h3 {
      margin: 0 0 6px;
      color: #fff;
      font-size: 24px;
    }

    .species-tag {
      display: inline-block;
      margin-top: 4px;
      margin-bottom: 10px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      border-radius: 999px;
      background: #2a2a2a;
      color: #ff6b6b;
    }

    .spice-meter {
      margin: 2px 0 12px;
      font-size: 18px;
      color: #ff3b30;
      letter-spacing: 1px;
    }

    .card p {
      margin: 0;
      color: #ddd;
      font-size: 15px;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #aaa;
      background: #0b0b0b;
      font-size: 15px;
      border-top: 1px solid #1f1f1f;
      margin-top: 70px;
    }

    @media (max-width: 850px) {
      .hero-small h1 {
        font-size: 38px;
      }

    const cardGrid = document.getElementById("cardGrid");
    const buttons = document.querySelectorAll(".filter-btn");
    const resultsLabel = document.getElementById("resultsLabel");

    function spiceIcons(level) {
      return "🌶".repeat(level);
    }

    function renderCards(filter = "all") {
      const filteredPeppers = peppers.filter(pepper => {
        return filter === "all" || pepper.species === filter;
      });

      cardGrid.innerHTML = filteredPeppers.map(pepper => `
        <div class="pepper-card" data-species="${pepper.species}">
          <a href="${pepper.file}" class="card-link">
            <div class="card">
              <h3>${pepper.name}</h3>
              <div class="species-tag">${pepper.speciesLabel}</div>
              <div class="spice-meter">${spiceIcons(pepper.spice)}</div>
              <p>${pepper.description}</p>
            </div>
          </a>
        </div>
      `).join("");

      if (filter === "all") {
        resultsLabel.textContent = "Showing all varieties";
      } else {
        resultsLabel.textContent = `Showing ${filter} varieties`;
      }
    }

    renderCards();

    buttons.forEach(button => {

        buttons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        renderCards(button.dataset.filter);
      });
